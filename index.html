<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Las 40 Vueltas al Sol de Fernando!</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f0fdf4; color:#333 }
        .hero-section { background-image:url('Images/Hero.jpg'); background-size:cover; background-position:center; height:60vh; display:flex; align-items:center; justify-content:center; color:white; position:relative }
        .hero-overlay { background:rgba(0,0,0,.3); position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:20px }
        h1,h2,h3 { font-weight:800; color:#059669 }
        .btn-primary { background:#059669; color:white; padding:12px 28px; border-radius:9999px; font-weight:700 }
        .btn-primary:hover { background:#047857 }
        .card { background:white; border-radius:15px; box-shadow:0 10px 25px rgba(0,0,0,.1); padding:30px; margin-bottom:30px }
        .form-input { border:1px solid #d1fae5; border-radius:8px; padding:12px; width:100%; margin-bottom:15px }
        .image-gallery { display:grid; grid-template-columns:repeat(auto-fit,minmax(250px,1fr)); gap:20px }
        .gallery-item img { border-radius:10px; width:100%; height:200px; object-fit:cover }
        .hidden { display:none }
    </style>
</head>

<body>

<!-- 🌍 IDIOMA -->
<div class="fixed top-4 right-4 z-50">
    <button onclick="setLang('es')" class="btn-primary text-sm">ES</button>
    <button onclick="setLang('en')" class="btn-primary text-sm ml-2">EN</button>
</div>

<!-- 🎵 MÚSICA -->
<audio id="background-music" autoplay loop>
    <source src="Images/Musica.mp3" type="audio/mpeg">
</audio>

<!-- HERO -->
<div class="hero-section">
    <div class="hero-overlay">
        <h1 data-es="¡Las 40 Vueltas al Sol de Fernando!" data-en="Fernando’s 40 Trips Around the Sun!">
            ¡Las 40 Vueltas al Sol de Fernando!
        </h1>
        <p data-es="Prepárate para una celebración inolvidable"
           data-en="Get ready for an unforgettable celebration">
           Prepárate para una celebración inolvidable
        </p>
        <button onclick="document.getElementById('main').classList.remove('hidden')" class="btn-primary">
            Descubrir
        </button>
    </div>
</div>

<div id="main" class="hidden max-w-4xl mx-auto p-6">

<!-- 📰 NOTICIAS -->
<section class="card">
    <h2 data-es="Noticias frescas ✈️" data-en="Fresh news ✈️">Noticias frescas ✈️</h2>
    <p data-es="Ya hay vuelos disponibles desde Bélgica y España. Precios ida y vuelta entre 700–900 €."
       data-en="Flights available from Belgium and Spain. Return prices between €700–900.">
       Ya hay vuelos disponibles desde Bélgica y España. Precios ida y vuelta entre 700–900 €.
    </p>
</section>

<!-- 📍 ITINERARIO -->
<section class="card">
    <h2 data-es="Itinerario" data-en="Itinerary">Itinerario</h2>
    <p data-es="🚧 Itinerario en construcción 🚧"
       data-en="🚧 Itinerary under construction 🚧">
       🚧 Itinerario en construcción 🚧
    </p>
</section>

<!-- 🖼️ GALERÍA -->
<section class="card">
    <div class="image-gallery">
        <div class="gallery-item"><img src="Images/2.jpg"></div>
        <div class="gallery-item"><img src="Images/3.jpg"></div>
        <div class="gallery-item"><img src="Images/4.jpg"></div>
        <div class="gallery-item"><img src="Images/5.jpg"></div>
        <div class="gallery-item"><img src="Images/6.jpg"></div>
    </div>
</section>

<!-- 📩 FORMULARIO -->
<section class="card">
<form action="https://formspree.io/f/xjkrnavo" method="POST">

<label>Nombre</label>
<input class="form-input" name="name" required>

<label>Email</label>
<input class="form-input" name="email" type="email" required>

<label>¿Necesitas ayuda con vuelos?</label>
<select class="form-input" name="flight_help" onchange="toggleFlights(this.value)">
    <option>No</option>
    <option>Sí</option>
</select>

<div id="flightFields" class="hidden">
    <input class="form-input" name="flight_origin" placeholder="Ciudad de salida">
    <input class="form-input" name="flight_dates" placeholder="Fechas aproximadas">
</div>

<label>Check-in en Koh Rong</label>
<input type="date" class="form-input" name="checkin_koh_rong">

<label>Check-out desde Koh Rong</label>
<input type="date" class="form-input" name="checkout_koh_rong">

<button class="btn-primary w-full mt-4">Enviar</button>
</form>
</section>

</div>

<script>
function toggleFlights(v){
    document.getElementById('flightFields').classList.toggle('hidden', v!=='Sí')
}

function setLang(lang){
    document.querySelectorAll('[data-es]').forEach(el=>{
        el.innerText = lang==='es' ? el.dataset.es : el.dataset.en
    })
}
</script>

</body>
</html>
